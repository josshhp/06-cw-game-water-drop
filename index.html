<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Water Drop Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="game-wrapper">
        <div id="game-container">

            <div id="game-hud">
                <h1 class="game-title">charity: water</h1>
                <div class="score-panel">
                    <div class="score">Score: <span id="score">0</span></div>
                    <div class="highscore-hud">High Score: <span id="high-score-hud">0</span></div>
                    <div class="lives">Lives: <span id="lives">3</span></div>
                </div>
                <div id="milestone-message" class="milestone-message" aria-live="polite"></div>
            </div>

            <div id="water-can" aria-label="Water can catcher"></div>
            <canvas id="confetti-canvas"></canvas>
            <span id="time" style="display:none">0</span>

            <div id="start-overlay">
                <div class="overlay-controls">
                    <label class="mode-label" for="mode-select-start">Difficulty</label>
                    <select id="mode-select-start" class="mode-select" aria-label="Select difficulty">
                        <option value="easy" selected>Easy</option>
                        <option value="medium">Medium</option>
                        <option value="hard">Hard</option>
                    </select>
                    <button id="start-btn">Start Game</button>
                </div>
            </div>

            <div id="game-over-overlay" class="hidden">
                <div id="game-over-box">
                    <div id="new-highscore-banner" class="hidden">🎉 New High Score! 🎉</div>
                    <h2 id="game-over-title">Try Again</h2>
                    <p class="result-score">Score: <span id="final-score">0</span></p>
                    <p class="result-highscore">Highscore: <span id="high-score">0</span></p>
                    <label class="mode-label" for="mode-select-end">Difficulty</label>
                    <select id="mode-select-end" class="mode-select" aria-label="Select difficulty">
                        <option value="easy" selected>Easy</option>
                        <option value="medium">Medium</option>
                        <option value="hard">Hard</option>
                    </select>
                    <button id="reset-btn">Reset</button>
                </div>
            </div>
        </div>

        <footer class="site-footer" aria-label="charity water link">
            <a
                class="site-footer-link"
                href="https://www.charitywater.org/"
                target="_blank"
                rel="noopener noreferrer"
            >
                Support charity: water
            </a>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
